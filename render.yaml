services:
  - type: web
    name: smartwork-backend
    plan: free
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: MONGO_URI
        sync: false
      - key: DB_NAME
        value: smartwork
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
